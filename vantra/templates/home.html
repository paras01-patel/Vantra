{% extends "base.html" %}

{% load static %}

{% block content %}

<style>

    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        background-color: #fff7fb;
        font-family: Arial, sans-serif;
    }

    /* ===== HERO IMAGE ===== */

    .men-img{
        width: 100%;
        height: 600px;
        object-fit: cover;
    }

    /* ===== PRODUCTS SECTION ===== */

    .menn{
        display: flex;
        gap: 20px;
        padding: 30px;
        overflow-x: auto;
        text-align: center;
    }

    .menn div{
        min-width: 220px;
        background: white;
        padding: 15px;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .menn img{
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 20px;
        border: 2px solid rgb(251, 205, 230);
        padding: 10px;
    }

    .menn p{
        margin-top: 10px;
        font-size: 20px;
        font-weight: bold;
        color: #333;
        border:1px  solid rgb(250, 158, 196);
        border-radius: 20px;
        padding: 5px;
        background-color: rgb(254, 197, 228);
    }

</style>

<!-- ===== HERO SECTION ===== -->

<section>
    <div>
        <img src="{% static 'images/men.png' %}" 
            alt=""
            class="men-img">
    </div>
</section>


<section class="menn">
    <div>
        <img src="{% static 'images/shirts.jpg' %}" alt="">
        <p>Shirts</p>
    </div>

    <div>
        <img src="{% static 'images/t-shirt.jpg' %}" alt="">
        <p>T-Shirts</p>
    </div>


    <div>
        <img src="{% static 'images/jeckets.jpg' %}" alt="">
        <p>Jeckets</p>
    </div>

    <div>
        <img src="{% static 'images/hoodieee.jpg' %}" alt="">
        <p>Hoodies</p>
    </div>
    
    <div>
        <img src="{% static 'images/sweater.jpg' %}" alt="">
        <p>Sweaters</p>
    </div>

    <div>
        <img src="{% static 'images/vest.jpg' %}" alt="">
        <p>Shots</p>
    </div>

</section>


<section class="menn">

    <div>
        <img src="{% static 'images/formall.jpg' %}" alt="">
        <p>Formal</p>
    </div>

    <div>
        <img src="{% static 'images/cargo.jpg' %}" alt="">
        <p>Cargoo</p>
    </div>

    <div>
        <img src="{% static 'images/tac.jpg' %}" alt="">
        <p>Track Pant</p>
    </div>

    <div>
        <img src="{% static 'images/jeans.jpg' %}" alt="">
        <p>Jeans</p>
    </div>

    <div>
        <img src="{% static 'images/nicker.jpg' %}" alt="">
        <p>Shots</p>
    </div>

    <div>
        <img src="{% static 'images/underwear.jpg' %}" alt="">
        <p>Underwear</p>
    </div>

</section>

{% endblock %}
