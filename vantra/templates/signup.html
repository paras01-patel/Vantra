{% extends "base.html" %}

{% block title %}Create Account - Bantra{% endblock %}

{% block content %}

<style>
/* ===== SIGNUP WRAPPER ===== */
.signup-wrapper{
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 80px 20px;
}

/* ===== CARD ===== */
.signup-card{
    width: 420px;
    background: #ffffff;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* TOP HEADER */
.signup-header{
    background: linear-gradient(135deg, #ffb300, #ff6f00);
    padding: 25px;
    text-align: center;
    color: white;
}

.signup-header h2{
    margin: 0;
    font-size: 24px;
}

.signup-header p{
    font-size: 13px;
    margin-top: 5px;
    opacity: 0.9;
}

/* FORM BODY */
.signup-body{
    padding: 25px;
}

/* INPUT BOX */
.input-box{
    margin-bottom: 15px;
}

.input-box input{
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: 0.3s;
}

.input-box input:focus{
    border-color: #ff6f00;
    box-shadow: 0 0 5px rgba(255,111,0,0.3);
}

/* BUTTON */
.signup-btn{
    width: 100%;
    padding: 12px;
    background: #111;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.signup-btn:hover{
    background: #ff6f00;
}

/* FOOTER TEXT */
.signup-footer{
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.signup-footer a{
    color: #ff6f00;
    text-decoration: none;
    font-weight: bold;
}

/* SMALL TAG */
.tag{
    text-align: center;
    font-size: 12px;
    color: #777;
    margin-top: 10px;
}
</style>

<div class="signup-wrapper">

    <div class="signup-card">

        <!-- HEADER -->
        <div class="signup-header">
            <h2>Join Vantra</h2>
            <p>Create your account & start shopping</p>
        </div>

        <!-- FORM -->
        <div class="signup-body">

            <form method="POST">
                {% csrf_token %}

                <div class="input-box">
                    <input type="text" name="username" placeholder="Username" required>
                </div>

                <div class="input-box">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>

                <div class="input-box">
                    <input type="password" name="password1" placeholder="Create Password" required>
                </div>

                <div class="input-box">
                    <input type="password" name="password2" placeholder="Confirm Password" required>
                </div>

                <button type="submit" class="signup-btn">Create Account</button>

            </form>

            <div class="signup-footer">
                Already have an account? <a href="{% url 'login' %}">Login</a>
            </div>

            <div class="tag">
                Safe • Secure • Trusted Shopping Experience
            </div>

        </div>

    </div>

</div>

{% endblock %}
